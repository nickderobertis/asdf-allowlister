# Optional pre-commit hooks. They are not part of `just check`. To enable them,
# install the pre-commit framework (https://pre-commit.com) and run
# `pre-commit install`. The shell hooks reuse the just recipes, so they apply
# the same file lists and rules as CI and require the asdf-managed dev tools on
# PATH. Every hook either rewrites files (and fails) or fails outright; none are
# warning-only.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: shfmt
        name: shfmt (format check)
        entry: just format-check
        language: system
        pass_filenames: false
      - id: shellcheck
        name: shellcheck
        entry: just lint
        language: system
        pass_filenames: false
      - id: actionlint
        name: actionlint
        entry: just actionlint
        language: system
        pass_filenames: false
        files: ^\.github/workflows/
