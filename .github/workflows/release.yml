name: Release

# Automatic releases. On every push to main, semantic-release inspects the
# Conventional Commits since the last release, decides the next version, and —
# only when the commits warrant one — creates the tag and publishes a GitHub
# Release with generated notes. Commits that do not warrant a release (docs, ci,
# chore, refactor, test, style, build) produce no release. asdf installs the
# plugin from the default branch, so tags are human-facing versioning rather
# than plugin resolution.
on:
  push:
    branches: [main]

# semantic-release pushes the tag, creates the release, and comments on the
# released pull requests and issues.
permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0 # full history so commit analysis and notes are complete
      - uses: actions/setup-node@v6
        with:
          node-version-file: .tool-versions
      - run: npm ci
      - name: semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx --no-install semantic-release
